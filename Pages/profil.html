<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Profil</title>
        <link rel="stylesheet" href="../Style/profil.css">
    </head>
    <body>
        <h1> Votre personne </h1>
        <div id="ahah">
            <div id="Choix">
                <div id="photo">
                    <img id="pdp" src="../Images/pdp/g10.png">
                    <input type="file" id="input" name="pdppp" accept="image/png, image/jpeg" style='display:none;'> <!-- Si tu as le temps pour les payeurs on peut mettre des gifs-->
                    <button id="btninput">Upload File</button>
                    <button id="random"> Random </button>
                </div>
                <div id="bio">
                    <textarea id="story" name="story" rows="8" cols="35" maxlength="535"></textarea>
                </div>
                <div id="infos_persos">
                    <input id="Sobriquet" type="text" placeholder="">

                    <input id="Email" type="email" placeholder="">

                    <input id="mdp" disabled="disabled" type="password" placeholder="">
                    <input id="mdp_nv" type="password" placeholder="" style="display:none;">
                    <button id="mdpconfirm" style="display:none;">Confirmer</button>
                    <button id="modif">Modifier</button>
                </div>
                <div id="donnees">
                    <div class="rune_stat">
                        <label class="libelle_rune">Suiviteurs</label>
                        <label class="chiffre_occulte" id="nb_abonnes">0</label>
                    </div>
                    <div class="rune_stat">
                        <label class="libelle_rune">Suivis</label>
                        <label class="chiffre_occulte" id="nb_abonnements">0</label>
                    </div>
                    <div class="rune_stat">
                        <label class="libelle_rune">Publications</label>
                        <label class="chiffre_occulte" id="nb_parchemins">0</label>
                    </div>
                    <div class="rune_stat">
                        <label class="libelle_rune">Sortilèges reçus</label>
                        <label class="chiffre_occulte" id="nb_sortileges">0</label>
                    </div>
                </div>
                <div id="quitt">
                    <button id="quitter" onclick="window.location.href='page_principale.html'"> Retour </button>
                </div>
            </div>
            <button id="sauvegarder"> Sauvegarder modifications</button>
            <div id="supprcompte">
                <button id="supprimer"> Supprimer mon compte</button>
            </div>

        </div>
    </body>
    <script src="../Scripts/profil.js"></script>
</html>
